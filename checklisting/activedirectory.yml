Host Enumeration (THIS WAS MISSING)

On any Windows shell:

whoami /all
ipconfig /all
net user /domain
net group /domain
net localgroup administrators

Check:

Installed software
Running services
Scheduled tasks
Startup scripts

→ Look for creds, writable paths, misconfigs

SYSVOL / GPO (high-yield, keep prominent)
SYSVOL / NETLOGON:
scripts
passwords
config files
Group Policy Preferences:
cpassword
