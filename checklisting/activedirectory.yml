Active Directory
Enumeration (with credentials)

bloodhound-python or SharpHound — always, immediately
Look for shortest path to DA in Bloodhound
Kerberoastable accounts — GetUserSPNs.py
ASREPRoastable accounts — GetNPUsers.py
Password spray with known usernames — every service, every machine
list of what ive sprayed:

Check for unconstrained/constrained delegation
Look for DCSync rights, GenericAll, WriteDACL, WriteOwner on any interesting objects

Lateral movement

Pass the hash — try every hash you find everywhere
Pass the ticket
Overpass the hash
Check every machine you compromise for cached credentials, tickets, interesting files
Look for local admin rights on other machines with your current user

Things people miss

SYSVOL/NETLOGON shares — scripts, Group Policy Preferences with cpassword
Description fields in AD — admins sometimes put passwords there
ACL abuse chains in Bloodhound that aren't the obvious shortest path
Machine accounts having interesting permissions
Old/disabled accounts sometimes have reused passwords still valid elsewhere
