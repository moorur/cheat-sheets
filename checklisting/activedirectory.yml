Active Directory
Enumeration (NO creds)

Identify domain:

ldapsearch, nmap, SMB banner grabbing
Domain name, DC hostname, OS version

Users:

kerbrute userenum (if possible)

Shares:

smbclient -L
null/guest access

→ Note usernames, shares, policies, anything readable

Enumeration (WITH creds)

BloodHound (always, early):

bloodhound-python / SharpHound
Don’t just shortest path → look for:
GenericAll / GenericWrite
WriteDACL / WriteOwner
ForceChangePassword
AddMember / AddSelf

Users & accounts:

Kerberoast → GetUserSPNs.py
ASREPRoast → GetNPUsers.py
Check for password reuse patterns (names, seasons, years)

Password attacks:

Password spray (controlled)
Try creds on:
SMB
WinRM
RDP
LDAP

→ keep your:

list of what ive sprayed:

Shares:

Enumerate ALL accessible shares
Look for:
scripts
configs
backups
credentials
Privilege Escalation (AD objects)

From BloodHound + manual checks:

DCSync rights
GenericAll / GenericWrite
WriteDACL / WriteOwner
ForceChangePassword

Delegation:

Unconstrained
Constrained
Resource-based constrained delegation (RBCD)

→ If you see control over an object, ask: “what can I force it to do?”

