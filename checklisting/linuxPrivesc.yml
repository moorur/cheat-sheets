Linux Privesc

sudo -l — always, even without a password (NOPASSWD entries)
SUID binaries — find / -perm -4000 2>/dev/null — check GTFOBins


SGID binaries — find / -perm -2000 2>/dev/null


Capabilities — getcap -r / 2>/dev/null

Writable files owned by root — find / -writable -not -path "/proc/*" 2>/dev/null

Cron jobs — /etc/crontab, /var/spool/cron, /etc/cron.*, check for writable scripts


PATH hijacking — writable directory early in PATH, root running something without full path


Running processes — ps aux pspy, look for anything running as root


Internal ports — ss -tlnp or netstat -tlnp — anything listening on localhost only


Installed software versions — check for local privesc CVEs


Readable /etc/shadow or /etc/passwd writable


Reused passwords — try every credential you found everywhere


All dotfiles in every home directory — .bashrc, .bash_profile, .profile, .env, .bash_history


Config files for every service — database configs, app configs, anything with credentials


Log files — sometimes credentials passed as arguments show up in logs


NFS with no_root_squash


Docker/LXC group membership


Writable service files or systemd units


linpeas, but don't stop there if it finds nothing

