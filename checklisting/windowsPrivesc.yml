Windows Privesc

whoami /all — privileges, groups


SeImpersonatePrivilege / SeAssignPrimaryTokenPrivilege → Potato attacks


SeBackupPrivilege → read SAM/SYSTEM


SeDebugPrivilege → process injection


systeminfo — OS version, hotfixes, check for kernel exploits


Running services — sc query, Get-Service, look for non-standard ones

Writable service binaries or unquoted service paths


Scheduled tasks — schtasks /query /fo LIST /v


AlwaysInstallElevated — check both HKLM and HKCU


Writable registry keys for services


Stored credentials — cmdkey /list, credential manager, unattend.xml, web.config, Groups.xml in SYSVOL


SAM/SYSTEM/SECURITY if readable


Installed software — look for vulnerable versions with local exploits


Reused passwords — try everything everywhere


winpeas, but don't rely on it exclusively

